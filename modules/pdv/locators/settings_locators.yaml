# Locators — Tela: Configurações (SettingsScreen)
# Sem testTags — usa texto (GAP: solicitar tags ao dev)

settings:
  # Configuração de impressões
  printers: //android.widget.TextView[@text="Impressões"]
  # Lista de impressoras
  list_printers: //android.widget.TextView[@text="Lista de Impressoras"]
  # Checkbox da impressora
  checkbox: ${APP_PACKAGE}:id/lista_dispositivo_checkBox
  # Fechar lista de impressoras
  close: ${APP_PACKAGE}:id/btnlistadispositivocancelar
  # Formas de pagamento
  payments_forms: //android.widget.TextView[@text="Formas de Pagamento"]
  # Habilitar Pix Off
  enable_pixoff: //androidx.compose.ui.platform.ComposeView/android.view.View/android.view.View/android.view.View[1]/android.view.View/android.view.View[2]/android.view.View[2]/android.view.View[9]
  # Habilitar Boleto
  enable_bankslip: //androidx.compose.ui.platform.ComposeView/android.view.View/android.view.View/android.view.View[1]/android.view.View/android.view.View[2]/android.view.View[2]/android.view.View[7]
  # Habilitar Pix
  enable_pix: //androidx.compose.ui.platform.ComposeView/android.view.View/android.view.View/android.view.View[1]/android.view.View/android.view.View[2]/android.view.View[2]/android.view.View[8]
  # Desabilitar cartão de crédito
  disable_credit_card: //androidx.compose.ui.platform.ComposeView/android.view.View/android.view.View/android.view.View[1]/android.view.View/android.view.View[2]/android.view.View[2]/android.view.View[4]
  # Desabilitar cartão de débito
  disable_debit_card: //androidx.compose.ui.platform.ComposeView/android.view.View/android.view.View/android.view.View[1]/android.view.View/android.view.View[2]/android.view.View[2]/android.view.View[5]
  # Voltar da tela de impressões (contentDescription)
  back: //android.widget.ImageView[@content-desc="Voltar"]
  # Voltar das configurações (contentDescription)
  back_settings: //android.view.View[@content-desc="Voltar"]
  # Emissão de ticket
  ticket: //android.widget.TextView[@text="Emissão de Ticket"]
  # Seletor de ação de ticket
  ticket_action_list: //android.widget.Spinner
  # Opção imprimir ticket
  ticket_print: //android.widget.TextView[@text="Imprimir"]
  # Opção perguntar sobre ticket
  ticket_quest: //android.widget.TextView[@text="Perguntar"]
  # Opção nenhuma ação de ticket
  ticket_noaction: //android.widget.TextView[@text="Nenhuma Ação"]
  # Texto da pergunta de impressão de ticket
  ticket_quest_text: //android.widget.TextView[@text="Deseja imprimir o(s) ticket(s) de retirada?"]
  # Confirmar impressão de ticket
  ticket_quest_confirm: //android.widget.TextView[@text="Sim"]
  # Cancelar impressão de ticket
  ticket_quest_cancel: //android.widget.TextView[@text="Não"]
  # Opção Smart PDV
  smart_pdv: //android.widget.TextView[@text="Smart PDV"]
  # Toggle de conferência ao finalizar pedido
  conference_order: //android.widget.TextView[@text="Conferência ao finalizar o pedido"]
  # Spinner "Modo de operacao"
  mod_operation: //android.widget.Spinner
  # Express (Venda Rápida)
  express: //android.widget.TextView[@text="Express (Venda Rápida)"]
  # Mini PDV
  mini_pdv: //android.widget.TextView[@text="Mini PDV"]
  # Padrao (Conferencia Ativa)
  default: //android.widget.TextView[@text="Padrão (Conferência Ativa)"]
