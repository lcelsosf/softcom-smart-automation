# Locators — Tela: Lista de Pedidos (ListOrdersScreen)
# Sem testTags — usa XPath por posição (GAP: solicitar tags ao dev)

list_orders:
  # Primeiro pedido da lista
  order1: //androidx.compose.ui.platform.ComposeView/android.view.View/android.view.View/android.view.View[1]/android.view.View[5]/android.view.View
  # Opção visualizar pedido no menu de ações
  visualize_order: //android.widget.TextView[@text="Visualizar pedido"]
  # Título da tela de detalhes do pedido
  details_order: //android.widget.TextView[@text="Detalhes do Pedido"]
  # Voltar da lista de pedidos
  back_list_orders: //android.view.View[@content-desc="Voltar"]
  # Opção reimprimir pedido
  reprint: //android.widget.TextView[@text="Reimprimir"]
  # Tela de reimpressão (aguardar visibilidade)
  reprint_text: //android.view.ViewGroup/android.view.View/android.view.View/android.view.View
  # Opção cancelar pedido
  list_cancel_order: //android.widget.TextView[@text="Cancelar Pedido"]
  # Texto de confirmação de cancelamento do pedido
  list_cancel_order_text: //android.widget.TextView[@text="Ei, vai mesmo cancelar esse pedido?"]
  # Confirmar cancelamento do pedido
  list_cancel_order_confirm: //android.widget.TextView[@text="Sim"]
  # Cancelar (não confirmar) o cancelamento
  list_cancel_order_cancel: //android.widget.TextView[@text="Não"]
  # Texto de sucesso no cancelamento
  list_cancel_order_text_confirm: //android.widget.TextView[@text="Pedido cancelado com sucesso"]
  # Botão Ok após cancelamento
  list_cancel_order_text_ok: //android.widget.TextView[@text="Ok!"]
  # Botão imprimir (contentDescription)
  print: //android.view.View[@content-desc="Imprimir"]
  # Opção recebimentos no menu de impressão
  receipts: //android.widget.TextView[@text="Recebimentos"]
  # Opção resumo de vendas no menu de impressão
  sales_summary: //android.widget.TextView[@text="Resumo de Vendas"]
  # Voltar do menu de impressão
  print_back: //android.widget.TextView[@text="Voltar"]
