# Locators — Tela: Faturamento / Pagamento (PaymentScreen + ValorPagamentoDialog)
# testTag via testTagsAsResourceId=true → xpath @resource-id
# contentDescription → accessibility id

invoice:
  # ---- Métodos de pagamento (PaymentMethodTile) ----

  # Tile de pagamento: Dinheiro (posição 0)
  money: xpath=//*[@resource-id='PaymentMethodTileText_0']

  # Tile de pagamento: Pix Off (posição 4)
  pixoff: xpath=//*[@resource-id='PaymentMethodTileText_4']

  # ---- Dialog: Valor de Pagamento ----

  # Botão confirmar valor no dialog
  confirm: xpath=//*[@resource-id='ValorPagamentoDialogText_23']

  # Botão cancelar valor no dialog
  cancel: xpath=//*[@resource-id='ValorPagamentoDialogText_22']

  # ---- Barra inferior de pagamento ----

  # Botão "Finalizar Venda"
  finalize_sale: xpath=//*[@resource-id='PaymentBottomBarText_0']
