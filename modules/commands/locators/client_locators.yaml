# Locators — Tela: Selecionar Cliente (ComandaSelecionarClienteScreen)
# testTag via testTagsAsResourceId=true → xpath @resource-id
# contentDescription → accessibility id

client:
  # Campo de busca de clientes
  search_client: xpath=//*[@resource-id='ComandaSelecionarClienteScreenSearchBarCustom_0']//android.widget.EditText

  # Primeiro item da lista de clientes (posição 0)
  client_item: xpath=//*[@resource-id='ComandaSelecionarClienteScreenClienteListItem_0']

  # Botão "Novo Cliente" na barra inferior
  new_client: xpath=//*[@resource-id='ComandaSelecionarClienteScreenBottomBarButton_0']

  # Ícone voltar (contentDescription="Voltar")
  back: accessibility id=Voltar

  # Ícone atualizar lista (contentDescription="Atualizar")
  refresh: accessibility id=Atualizar
