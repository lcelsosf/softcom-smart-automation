# Locators — Tela: Mesa Aberta (ComandaMesaScreen)
# testTag via testTagsAsResourceId=true → xpath @resource-id
# contentDescription → accessibility id

table:
  # Ícone menu hamburguer (contentDescription="Menu")
  menu: //android.view.View[@content-desc="Menu"]

  # Ícone imprimir conferência (contentDescription="Imprimir")
  conference_print: //android.view.View[@content-desc="Imprimir"]

  # View de confirmacao da impressao de conferencia
  conference_question: //android.widget.TextView[@text="Deseja solicitar a conferência?"]

  # Botão confirmar conferência
  conference_confirm: //android.widget.TextView[@text="Sim"]

  # Botão cancelar conferência
  conference_cancel: //android.widget.TextView[@text="Não"]

  # Aba Produtos na TabRow
  products: xpath=//*[@resource-id='ComandaMesaScreenText_1']

  # Aba Conferência na TabRow
  conference: xpath=//*[@resource-id='ComandaMesaScreenText_5']

  # Aba Lançados na TabRow
  released: xpath=//*[@resource-id='ComandaMesaScreenText_6']

  # Botão avançar/receber pedido na barra inferior (texto)
  advance: xpath=//*[@resource-id='ComandaMesaScreenBottomBarText_3']

  # Botão cancelar/voltar na barra inferior (texto)
  cancel: xpath=//*[@resource-id='ComandaMesaScreenBottomBarText_2']

  # Ícone filtrar itens (contentDescription="Filtrar")
  filter: //android.view.View[@content-desc="Filtrar"]

  # Campo de pesquisa na tela de filtro de grupos
  filter_text: //android.widget.EditText

  # Grupo resultado do filter
  group: //android.view.View[@resource-id="ComandaMesaProdutosContentFilterDialogComandaMesaGrupoFilterCard_0"]

  # Botao de confirmacao do filtro
  filter_confirm: //android.widget.TextView[@resource-id="ComandaMesaProdutosContentFilterDialogText_4"]

  # Botao de cancelamento do filtro
  filter_cancel: //android.view.View[@resource-id="ComandaMesaProdutosContentFilterDialogOutlinedButton_0"]

  # Ícone limpar pesquisa (contentDescription="Limpar pesquisa")
  clean_search: //android.view.View[@content-desc="Limpar pesquisa"]

  # View de produtos nao encontrados
  empty_state: //android.widget.TextView[@resource-id="EmptyStateCustomText_0"]

  # Botao Receber Pedido
  receive_order: //android.widget.TextView[@resource-id="ComandaMesaScreenBottomBarText_3"]

  # Botao de remover item
  remove_item: //android.view.View[@content-desc="Remover item"]

  #
  remove_item_confirm: //android.widget.TextView[@text="Sim"]

  remove_item_cancel: //android.widget.TextView[@text="Não"]

  remove_item_text: //android.widget.TextView[@resource-id="ComandaNaMesaContentConfirmCancelText_0"]
