# Locators — Dialog: Cancelar Mesa (MotivoCancelarMesaDialog + ConfirmCancelarMesaDialog)
# Sem testTags — usa texto (GAP: solicitar tags ao dev)
# contentDescription → accessibility id

cancel_table:
  # Alerta quando mesa possui adiantamentos e não pode ser cancelada
  table_advance: xpath=//*[@text='Esta mesa possui adiantamentos lançados e não pode ser cancelada.']

  # Botão OK do alerta de adiantamentos
  ok: xpath=//*[@text='OK']

  # Hint do campo motivo de cancelamento
  cancel_reason: xpath=//*[@text='Digite aqui o motivo do cancelamento']

  # Campo EditText do motivo
  cancel_reason_text: xpath=//android.widget.EditText

  # Botão confirmar cancelamento (MotivoCancelarMesaDialog)
  confirm: xpath=//*[@text='Confirmar']

  # Texto de confirmação antes de cancelar (contém número da mesa)
  cancel_question: xpath=//*[contains(@text,'Deseja realmente cancelar a Mesa')]

  # Botão "Sim" na confirmação final
  confirm_cancel: xpath=//*[@text='Sim']

  # Botão "Não" na confirmação final
  abort_cancel: xpath=//*[@text='Não']
