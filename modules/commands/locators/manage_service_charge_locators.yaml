# Locators — Tela: Gerenciar Taxas de Serviço

manage_service_charge:
  # Tela de gerenciar taxas de serviço
  verify: xpath=(//android.widget.TextView[@text="Taxa de Serviço"])[1]

  # Botão "Ativar/Desativar" na tela de gerenciar taxas de serviço
  toggle_button: xpath=(//android.widget.TextView[@text="Taxa de Serviço"])[2]

  # Botão "Confirmar" no dialog de gerenciar taxas de serviço
  confirm: //android.widget.TextView[@text="Confirmar"]

  # Botão "Cancelar" no dialog de gerenciar taxas de serviço
  cancel: //android.widget.TextView[@text="Cancelar"]

  # View de confirmação na tela de gerenciar taxas de serviço
  question_view: //android.widget.TextView[@text="Confirma alteração na Taxa de Serviço?"]

  # Botão "Sim" no dialog de confirmação
  question_confirm: //android.widget.TextView[@text="Sim"]

  # Botão "Não" no dialog de confirmação
  question_negative: //android.widget.TextView[@text="Não"]
